version: '3.8'

services:
  nocturne-app:
    image: node:20-slim
    container_name: nocturne-sync-server
    user: root
    restart: always
    working_dir: /app
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=192.168.31.250     # 您的群晖 NAS IP
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=A9878480a！    # 数据库密码
      - DB_NAME=nocturne_sync
      - JWT_SECRET=nocturne_reader_secret_key
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - .:/app
    command: >
      sh -c "
      echo '--- 正在准备运行环境 ---' &&
      apt-get update && apt-get install -y python3 python3-pip &&
      echo '--- 正在安装后端依赖 ---' &&
      pip3 install -r requirements.txt --break-system-packages &&
      echo '--- 正在构建前端灵魂 ---' &&
      npm install --legacy-peer-deps &&
      npm run build &&
      echo '--- FastAPI + React 服务启动中 ---' &&
      python3 main.py"

networks:
  default:
    name: nocturne-network
