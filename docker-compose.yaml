version: '3.8'

services:
  nocturne-app:
    image: node:22-alpine
    container_name: nocturne-sync-server
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    working_dir: /app
    environment:
      - NODE_ENV=production
      - DB_HOST=192.168.31.250     # 您的 NAS IP
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=A9878480a！    # 您的数据库密码
      - DB_NAME=nocturne_sync
      - JWT_SECRET=nocturne_reader_secret_key
    # 启动指令：自动换源、安装所有依赖、构建并运行
    command: sh -c "npm config set registry https://registry.npmmirror.com && npm install --include=dev --legacy-peer-deps && npm run build && npm start"

networks:
  default:
    name: nocturne-network
